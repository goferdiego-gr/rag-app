<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grama — Portal de Aplicadores</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:15px}
.hidden{display:none!important}
.app{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#1A5C2E;border-color:#1A5C2E;color:#fff}
.btn-primary:hover{background:#2D8A4E}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-full{width:100%}
label{font-size:13px;color:#666;display:block;margin-bottom:5px;margin-top:12px}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#2D8A4E;box-shadow:0 0 0 3px rgba(45,138,78,0.1)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-semilla{background:#E8F5EC;color:#2D8A4E}
.badge-verde{background:#C8E6C9;color:#1A5C2E}
.badge-master{background:#1A5C2E;color:#fff}
.badge-socio{background:#FFF8E1;color:#7B5800}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem}
.alert-ok{background:#E8F5EC;color:#1A5C2E;border:1px solid #4CAF7D}
.alert-err{background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e0e0e0}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:36px;height:36px;border-radius:50%;background:#1A5C2E;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-name{font-weight:600;font-size:16px}
.logo-sub{font-size:12px;color:#666}
.tabs{display:flex;gap:2px;border-bottom:1px solid #e0e0e0;margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:9px 16px;font-size:14px;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.tab.on{color:#1A5C2E;border-bottom-color:#1A5C2E;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.grid4{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
.stat{background:#f9f9f9;border-radius:10px;padding:1rem;text-align:center}
.stat-v{font-size:22px;font-weight:600;color:#1A5C2E}
.stat-l{font-size:12px;color:#888;margin-top:3px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;border-bottom:1px solid #e0e0e0;color:#666;font-weight:600;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0;color:#1a1a1a}
tr:last-child td{border-bottom:none}
.ap-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.ap-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;background:#E8F5EC;color:#1A5C2E;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e0e0e0;border-top-color:#1A5C2E;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;z-index:100}
.com-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.com-total{display:flex;justify-content:space-between;background:#E8F5EC;border-radius:8px;padding:12px 16px;font-weight:600;color:#1A5C2E;font-size:16px;margin-top:8px}
.empty{color:#999;font-size:13px;padding:1rem 0;text-align:center}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>
<div class="app">

<div id="s-login" class="hidden">
  <div style="max-width:380px;margin:3rem auto">
    <div style="text-align:center;margin-bottom:2rem">
      <div class="logo-dot" style="width:56px;height:56px;font-size:24px;margin:0 auto 12px">G</div>
      <div style="font-size:22px;font-weight:700">Grama</div>
      <div style="font-size:13px;color:#888;margin-top:4px">Portal de Aplicadores Certificados</div>
    </div>
    <div class="card">
      <div id="l-alert" class="hidden"></div>
      <label>Usuario</label>
      <input type="text" id="l-user" placeholder="tu.usuario" autocomplete="username" />
      <label>Contraseña</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" />
      <button class="btn btn-primary btn-full" style="margin-top:18px" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<div id="s-admin" class="hidden">
  <div class="topbar">
    <div class="logo">
      <div class="logo-dot">G</div>
      <div><div class="logo-name">Grama Admin</div><div class="logo-sub">Panel de control</div></div>
    </div>
    <button class="btn btn-sm" onclick="doLogout()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="adminTab(this,'at-res')">Resumen</button>
    <button class="tab" onclick="adminTab(this,'at-aps')">Aplicadores</button>
    <button class="tab" onclick="adminTab(this,'at-svcs')">Servicios</button>
    <button class="tab" onclick="adminTab(this,'at-coms')">Comisiones</button>
    <button class="tab" onclick="adminTab(this,'at-nuevo')">+ Nuevo aplicador</button>
  </div>
  <div id="at-res">
    <div class="grid4" id="a-stats" style="margin-bottom:1.25rem"></div>
    <div class="grid2">
      <div class="card"><div style="font-weight:600;margin-bottom:1rem">Aplicadores activos</div><div id="a-ap-list"></div></div>
      <div class="card"><div style="font-weight:600;margin-bottom:1rem">Servicios recientes</div><div id="a-svc-recent"></div></div>
    </div>
  </div>
  <div id="at-aps" class="hidden">
    <div class="card tbl-wrap"><table id="tbl-aps"></table></div>
  </div>
  <div id="at-svcs" class="hidden">
    <div class="card tbl-wrap">
      <div style="font-weight:600;margin-bottom:1rem">Todos los servicios</div>
      <table id="tbl-svcs-a"></table>
    </div>
  </div>
  <div id="at-coms" class="hidden">
    <div class="card tbl-wrap">
      <div style="font-weight:600;margin-bottom:1rem">Comisiones estimadas del mes</div>
      <table id="tbl-coms"></table>
    </div>
  </div>
  <div id="at-nuevo" class="hidden">
    <div class="card" style="max-width:460px">
      <div style="font-weight:600;margin-bottom:1rem">Agregar nuevo aplicador</div>
      <div id="nuevo-alert" class="hidden"></div>
      <label>Nombre completo</label><input type="text" id="n-nombre" placeholder="Ej. Carlos Mendoza" />
      <label>Zona / ciudad</label><input type="text" id="n-zona" placeholder="Ej. CDMX Norte" />
      <label>Perfil</label>
      <select id="n-perfil">
        <option>Jardinero independiente</option>
        <option>Empresa de mantenimiento</option>
        <option>Paisajista</option>
        <option>Proveedor de campos deportivos</option>
      </select>
      <label>Usuario (para login)</label><input type="text" id="n-usuario" placeholder="Ej. carlos.mendoza" />
      <label>Contraseña inicial</label><input type="text" id="n-pass" placeholder="Ej. grama2025" />
      <button class="btn btn-primary" style="margin-top:18px" onclick="crearAplicador()">Crear aplicador</button>
    </div>
  </div>
</div>

<div id="s-ap" class="hidden">
  <div class="topbar">
    <div class="logo">
      <div class="logo-dot">G</div>
      <div><div class="logo-name" id="ap-name"></div><div class="logo-sub" id="ap-nivel-sub"></div></div>
    </div>
    <button class="btn btn-sm" onclick="doLogout()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="apTab(this,'apt-ini')">Inicio</button>
    <button class="tab" onclick="apTab(this,'apt-reg')">Registrar</button>
    <button class="tab" onclick="apTab(this,'apt-hist')">Historial</button>
    <button class="tab" onclick="apTab(this,'apt-com')">Mi comisión</button>
  </div>
  <div id="apt-ini">
    <div class="grid4" id="ap-stats" style="margin-bottom:1.25rem"></div>
    <div class="card"><div style="font-weight:600;margin-bottom:1rem">Últimos servicios</div><div id="ap-recientes"></div></div>
  </div>
  <div id="apt-reg" class="hidden">
    <div class="card" style="max-width:500px">
      <div style="font-weight:600;margin-bottom:1rem">Registrar nuevo servicio</div>
      <div id="r-alert" class="hidden"></div>
      <label>Fecha del servicio</label><input type="date" id="r-fecha" />
      <label>Cliente / propiedad</label><input type="text" id="r-cliente" placeholder="Ej. Hotel Las Palmas" />
      <label>Metros cuadrados aplicados</label><input type="number" id="r-m2" placeholder="Ej. 300" min="1" />
      <label>Producto utilizado</label>
      <select id="r-prod">
        <option value="">-- Selecciona --</option>
        <option>Pintapasto Verde Intenso 1L</option>
        <option>Pintapasto Verde Intenso 4L</option>
        <option>Pintapasto Verde Natural 1L</option>
        <option>Pintapasto Verde Natural 4L</option>
        <option>Pintura para Mulch 1L</option>
        <option>Pintura para Mulch 4L</option>
      </select>
      <label>Litros utilizados</label><input type="number" id="r-litros" placeholder="Ej. 2" min="0.1" step="0.1" />
      <label>Notas (opcional)</label><input type="text" id="r-notas" placeholder="Tipo de superficie, condiciones..." />
      <button class="btn btn-primary" style="margin-top:18px" onclick="registrar()">Guardar servicio</button>
    </div>
  </div>
  <div id="apt-hist" class="hidden">
    <div class="card tbl-wrap">
      <div style="font-weight:600;margin-bottom:1rem">Historial completo</div>
      <table id="tbl-hist"></table>
    </div>
  </div>
  <div id="apt-com" class="hidden">
    <div class="card" style="max-width:460px">
      <div style="font-weight:600;margin-bottom:1rem">Mi comisión del mes</div>
      <div id="ap-com-det"></div>
    </div>
  </div>
</div>

</div>
<script>
const API='';
const NIVELES={
  semilla:{label:'Semilla',pct:12,bono:80,min:0},
  verde:{label:'Verde',pct:15,bono:100,min:5000},
  master:{label:'Master',pct:18,bono:130,min:15000},
  socio:{label:'Socio',pct:22,bono:160,min:30000}
};
let state={user:null,ap:null,aplicadores:[],servicios:[]};
async function api(path,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(API+'/api/'+path,opts);
  return r.json();
}
function show(id){document.getElementById(id).classList.remove('hidden')}
function hide(id){document.getElementById(id).classList.add('hidden')}
function loading(on){on?show('loading-overlay'):hide('loading-overlay')}
function fmx(n){return'$'+Math.round(n).toLocaleString('es-MX')+' MXN'}
function fdate(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function badge(nivel){return`<span class="badge badge-${nivel}">${NIVELES[nivel]?.label||nivel}</span>`}
function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function stat(v,l){return`<div class="stat"><div class="stat-v">${v}</div><div class="stat-l">${l}</div></div>`}
function getNivel(c){return c>=30000?'socio':c>=15000?'master':c>=5000?'verde':'semilla'}
function calcCom(ap,svcs){
  const n=NIVELES[ap.nivel||'semilla'];
  const bono=svcs.length*n.bono;
  const pct=(ap.compras_mes||0)*n.pct/100;
  const margen=svcs.reduce((a,s)=>a+(s.litros||0)*60,0);
  return{bono,pct,margen,total:bono+pct+margen};
}
async function doLogin(){
  const usuario=document.getElementById('l-user').value.trim();
  const password=document.getElementById('l-pass').value;
  const al=document.getElementById('l-alert');
  if(!usuario||!password){showAlert(al,'Por favor ingresa usuario y contraseña','err');return}
  loading(true);
  try{
    const r=await api('login','POST',{usuario,password});
    if(!r.ok){showAlert(al,r.error||'Error al iniciar sesión','err');return}
    state.user=r.user;state.ap=r.aplicador;
    hide('s-login');
    if(r.user.rol==='admin'){await loadAdmin();show('s-admin')}
    else{renderAplicador();show('s-ap')}
  }catch(e){showAlert(al,'Error de conexión. Intenta de nuevo.','err')}
  finally{loading(false)}
}
function doLogout(){
  state={user:null,ap:null,aplicadores:[],servicios:[]};
  hide('s-admin');hide('s-ap');
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
  show('s-login');
}
function showAlert(el,msg,type){
  el.className='alert alert-'+(type==='err'?'err':'ok');
  el.textContent=msg;
  el.classList.remove('hidden');
  if(type!=='err')setTimeout(()=>el.classList.add('hidden'),3500);
}
async function loadAdmin(){
  loading(true);
  try{
    const[aps,svcs]=await Promise.all([api('aplicadores'),api('servicios')]);
    state.aplicadores=Array.isArray(aps)?aps:[];
    state.servicios=Array.isArray(svcs)?svcs:[];
    renderAdminResumen();renderAdminAps();renderAdminSvcs();renderAdminComs();
  }finally{loading(false)}
}
function renderAdminResumen(){
  const aps=state.aplicadores,svcs=state.servicios;
  const totalM2=svcs.reduce((a,s)=>a+(s.m2||0),0);
  const totalCompras=aps.reduce((a,ap)=>a+(ap.compras_mes||0),0);
  document.getElementById('a-stats').innerHTML=
    stat(aps.length,'Aplicadores')+stat(svcs.length,'Servicios')+
    stat(totalM2.toLocaleString()+' m²','M² aplicados')+stat(fmx(totalCompras),'Compras del mes');
  document.getElementById('a-ap-list').innerHTML=aps.length?aps.map(ap=>`
    <div class="ap-row">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar">${initials(ap.nombre)}</div>
        <div><div style="font-size:14px;font-weight:600">${ap.nombre}</div><div style="font-size:12px;color:#888">${ap.zona}</div></div>
      </div>${badge(ap.nivel||'semilla')}</div>`).join(''):'<div class="empty">Sin aplicadores registrados</div>';
  document.getElementById('a-svc-recent').innerHTML=[...svcs].reverse().slice(0,5).map(s=>{
    const ap=state.aplicadores.find(a=>a.id===s.apId)||{nombre:'—'};
    return`<div class="ap-row"><div><div style="font-size:13px;font-weight:600">${s.cliente}</div><div style="font-size:12px;color:#888">${ap.nombre} · ${s.m2} m²</div></div><div style="font-size:12px;color:#888">${fdate(s.fecha)}</div></div>`;
  }).join('')||'<div class="empty">Sin servicios aún</div>';
}
function renderAdminAps(){
  document.getElementById('tbl-aps').innerHTML=
    `<thead><tr><th>Nombre</th><th>Zona</th><th>Perfil</th><th>Nivel</th><th>Compras mes</th><th>Servicios</th></tr></thead><tbody>`+
    (state.aplicadores.length?state.aplicadores.map(ap=>{
      const svcs=state.servicios.filter(s=>s.apId===ap.id).length;
      return`<tr><td><strong>${ap.nombre}</strong></td><td>${ap.zona}</td><td>${ap.perfil}</td><td>${badge(ap.nivel||'semilla')}</td><td>${fmx(ap.compras_mes||0)}</td><td>${svcs}</td></tr>`;
    }).join(''):'<tr><td colspan="6" style="text-align:center;color:#999">Sin aplicadores</td></tr>')+`</tbody>`;
}
function renderAdminSvcs(){
  document.getElementById('tbl-svcs-a').innerHTML=
    `<thead><tr><th>Fecha</th><th>Aplicador</th><th>Cliente</th><th>M²</th><th>Producto</th><th>Litros</th></tr></thead><tbody>`+
    ([...state.servicios].reverse().map(s=>{
      const ap=state.aplicadores.find(a=>a.id===s.apId)||{nombre:'—'};
      return`<tr><td>${fdate(s.fecha)}</td><td>${ap.nombre}</td><td>${s.cliente}</td><td>${s.m2}</td><td style="font-size:12px">${s.producto}</td><td>${s.litros}</td></tr>`;
    }).join('')||'<tr><td colspan="6" style="text-align:center;color:#999">Sin servicios</td></tr>')+`</tbody>`;
}
function renderAdminComs(){
  document.getElementById('tbl-coms').innerHTML=
    `<thead><tr><th>Aplicador</th><th>Nivel</th><th>Servicios</th><th>Bono</th><th>Comisión %</th><th>Margen</th><th>Total</th></tr></thead><tbody>`+
    (state.aplicadores.length?state.aplicadores.map(ap=>{
      const svcs=state.servicios.filter(s=>s.apId===ap.id);
      const c=calcCom(ap,svcs);
      return`<tr><td><strong>${ap.nombre}</strong></td><td>${badge(ap.nivel||'semilla')}</td><td>${svcs.length}</td><td>${fmx(c.bono)}</td><td>${fmx(c.pct)}</td><td>${fmx(c.margen)}</td><td><strong>${fmx(c.total)}</strong></td></tr>`;
    }).join(''):'<tr><td colspan="7" style="text-align:center;color:#999">Sin datos</td></tr>')+`</tbody>`;
}
async function crearAplicador(){
  const nombre=document.getElementById('n-nombre').value.trim();
  const zona=document.getElementById('n-zona').value.trim();
  const perfil=document.getElementById('n-perfil').value;
  const usuario=document.getElementById('n-usuario').value.trim();
  const password=document.getElementById('n-pass').value.trim();
  const al=document.getElementById('nuevo-alert');
  if(!nombre||!usuario||!password){showAlert(al,'Nombre, usuario y contraseña son requeridos','err');return}
  loading(true);
  try{
    const r=await api('aplicadores','POST',{nombre,zona,perfil,usuario,password});
    if(r.ok){
      showAlert(al,'Aplicador creado correctamente.','ok');
      document.getElementById('n-nombre').value='';
      document.getElementById('n-zona').value='';
      document.getElementById('n-usuario').value='';
      document.getElementById('n-pass').value='';
      await loadAdmin();
    }else{showAlert(al,r.error||'Error al crear','err')}
  }finally{loading(false)}
}
function renderAplicador(){
  const ap=state.ap;if(!ap)return;
  document.getElementById('ap-name').textContent=ap.nombre;
  document.getElementById('ap-nivel-sub').textContent='Aplicador Certificado · '+(NIVELES[ap.nivel||'semilla']?.label||ap.nivel);
  loadApSvcs();
  document.getElementById('r-fecha').value=new Date().toISOString().split('T')[0];
}
async function loadApSvcs(){
  loading(true);
  try{
    const svcs=await api('servicios?apId='+state.ap.id);
    state.servicios=Array.isArray(svcs)?svcs:[];
    renderApStats();renderApRecientes();renderApHist();renderApCom();
  }finally{loading(false)}
}
function renderApStats(){
  const ap=state.ap,svcs=state.servicios;
  const totalM2=svcs.reduce((a,s)=>a+(s.m2||0),0);
  const com=calcCom(ap,svcs);
  document.getElementById('ap-stats').innerHTML=
    stat(svcs.length,'Servicios')+stat(totalM2.toLocaleString()+' m²','M² aplicados')+
    stat(fmx(ap.compras_mes||0),'Compras del mes')+stat(fmx(com.total),'Comisión estimada');
}
function renderApRecientes(){
  document.getElementById('ap-recientes').innerHTML=[...state.servicios].reverse().slice(0,4).map(s=>
    `<div class="ap-row"><div><div style="font-size:14px;font-weight:600">${s.cliente}</div><div style="font-size:12px;color:#888">${s.m2} m² · ${s.producto}</div></div><div style="font-size:12px;color:#888">${fdate(s.fecha)}</div></div>`
  ).join('')||'<div class="empty">Sin servicios registrados aún</div>';
}
function renderApHist(){
  document.getElementById('tbl-hist').innerHTML=
    `<thead><tr><th>Fecha</th><th>Cliente</th><th>M²</th><th>Producto</th><th>Litros</th><th>Notas</th></tr></thead><tbody>`+
    ([...state.servicios].reverse().map(s=>
      `<tr><td>${fdate(s.fecha)}</td><td>${s.cliente}</td><td>${s.m2}</td><td style="font-size:12px">${s.producto}</td><td>${s.litros}</td><td style="font-size:12px;color:#888">${s.notas||'—'}</td></tr>`
    ).join('')||'<tr><td colspan="6" style="text-align:center;color:#999">Sin servicios aún</td></tr>')+`</tbody>`;
}
function renderApCom(){
  const ap=state.ap,svcs=state.servicios;
  const n=NIVELES[ap.nivel||'semilla'];
  const c=calcCom(ap,svcs);
  const sig=Object.values(NIVELES).find(lv=>lv.min>(ap.compras_mes||0));
  document.getElementById('ap-com-det').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="color:#666;font-size:14px">Nivel actual</span>${badge(ap.nivel||'semilla')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="color:#666;font-size:14px">Comisión sobre producto</span><span style="font-weight:600">${n.pct}%</span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <span style="color:#666;font-size:14px">Bono por aplicación</span><span style="font-weight:600">${fmx(n.bono)} c/u</span>
    </div>
    <div style="border-top:1px solid #e0e0e0;padding-top:14px;margin-bottom:8px">
      <div style="font-size:12px;color:#888;font-weight:600;margin-bottom:8px">DESGLOSE DEL MES</div>
      <div class="com-row"><span>${svcs.length} servicios × ${fmx(n.bono)}</span><span>${fmx(c.bono)}</span></div>
      <div class="com-row"><span>Comisión ${n.pct}% sobre ${fmx(ap.compras_mes||0)}</span><span>${fmx(c.pct)}</span></div>
      <div class="com-row"><span>Margen estimado en producto</span><span>${fmx(c.margen)}</span></div>
    </div>
    <div class="com-total"><span>Total estimado</span><span>${fmx(c.total)}</span></div>
    <div style="margin-top:10px;font-size:12px;color:#888">${sig?'Para nivel '+sig.label+' necesitas '+fmx(sig.min-(ap.compras_mes||0))+' más en compras este mes.':'¡Eres Socio Grama — el nivel más alto!'}</div>`;
}
async function registrar(){
  const fecha=document.getElementById('r-fecha').value;
  const cliente=document.getElementById('r-cliente').value.trim();
  const m2=parseFloat(document.getElementById('r-m2').value);
  const producto=document.getElementById('r-prod').value;
  const litros=parseFloat(document.getElementById('r-litros').value);
  const notas=document.getElementById('r-notas').value.trim();
  const al=document.getElementById('r-alert');
  if(!fecha||!cliente||!m2||!producto||!litros){showAlert(al,'Completa todos los campos obligatorios','err');return}
  loading(true);
  try{
    const r=await api('servicios','POST',{apId:state.ap.id,fecha,cliente,m2,producto,litros,notas});
    if(r.ok){
      state.ap.compras_mes=(state.ap.compras_mes||0)+litros*120;
      state.ap.nivel=getNivel(state.ap.compras_mes);
      document.getElementById('ap-nivel-sub').textContent='Aplicador Certificado · '+(NIVELES[state.ap.nivel]?.label||state.ap.nivel);
      document.getElementById('r-cliente').value='';
      document.getElementById('r-m2').value='';
      document.getElementById('r-prod').value='';
      document.getElementById('r-litros').value='';
      document.getElementById('r-notas').value='';
      showAlert(al,'Servicio registrado correctamente.','ok');
      await loadApSvcs();
    }else{showAlert(al,r.error||'Error al guardar','err')}
  }finally{loading(false)}
}
function adminTab(btn,target){
  document.querySelectorAll('#s-admin .tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  ['at-res','at-aps','at-svcs','at-coms','at-nuevo'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  show(target);
}
function apTab(btn,target){
  document.querySelectorAll('#s-ap .tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  ['apt-ini','apt-reg','apt-hist','apt-com'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  show(target);
}
window.addEventListener('load',()=>{hide('loading-overlay');show('s-login');});
